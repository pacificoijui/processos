<style>
  :root {
    --navy:      #1a3a6b;
    --navy-mid:  #1e4a8a;
    --navy-dark: #12294d;
    --navy-light:#2e5da8;
    --gold:      #e8a020;
    --gold-light:#f6b93b;
    --card:      #ffffff;
    --bg:        #eaeef6;
    --text:      #1c2433;
    --muted:     #6b7793;
    --border:    #dde4f0;
    --shadow:    0 2px 10px rgba(20,40,80,0.07);
    --shadow-md: 0 6px 22px rgba(20,40,80,0.10);
    --shadow-lg: 0 18px 50px rgba(15,30,70,0.22);
    --blue-bg:   #e7eefb;
    --blue-text: #1e4a8a;
    --green:     #2a8a3a;  --green-bg:  #e6f4ea;
    --red:       #c0282a;  --red-bg:    #fbe7e7;
    --amber:     #c07000;  --amber-bg:  #fef3dc;
    --today:     #fff6e2;
    --radius:    16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(46,93,168,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(232,160,32,0.07), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(46,93,168,0.18); }

  /* ── Layout principal ───────────────────────────────────────────────────── */
  main { max-width: 1320px; margin: 0 auto; padding: 26px 28px 60px; display: flex; flex-direction: column; gap: 26px; }
  .btn-primary { background: var(--navy); border: 1.5px solid var(--navy); color: #fff; border-radius: 10px; padding: 9px 18px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all .14s; box-shadow: 0 2px 10px rgba(26,58,107,0.25); white-space: nowrap; }
  .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,58,107,0.32); }

  /* ── Calendário ─────────────────────────────────────────────────────────── */
  .cal-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg,#fbfcff,#f4f7fd); }
  .cal-title { font-size: 22px; font-weight: 800; color: var(--navy); text-transform: capitalize; letter-spacing: -0.4px; }
  .cal-nav { display: flex; gap: 8px; align-items: center; }
  .cal-nav button { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--navy); font-size: 17px; cursor: pointer; transition: all .14s; display:flex; align-items:center; justify-content:center; }
  .cal-nav button:hover { background: var(--navy); color:#fff; border-color: var(--navy); transform: translateY(-1px); box-shadow: var(--shadow); }
  .cal-nav .hoje-btn { width: auto; padding: 0 16px; font-size: 12.5px; font-weight: 800; }
  .cal-nav .cal-novo { width: auto; height: 38px; padding: 0 18px; font-size: 13px; }
  .cal-nav .cal-novo:hover { color: #fff; }
  @media (max-width: 640px){
    .cal-head { flex-wrap: wrap; gap: 12px; }
    .cal-nav { flex-wrap: wrap; }
    .cal-nav .cal-novo { order: -1; }
  }
  .cal-weekdays { display: grid; grid-template-columns: repeat(5,1fr); background: linear-gradient(180deg,var(--navy-dark),var(--navy-mid)); }
  .cal-weekdays div { padding: 12px 0; text-align: center; font-size: 11.5px; font-weight: 800; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 1px; }
  .cal-grid { display: grid; grid-template-columns: repeat(5,1fr); }
  .cal-cell { min-height: 132px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 9px 9px; display: flex; flex-direction: column; gap: 5px; position: relative; transition: background .15s; }
  .cal-cell:nth-child(5n) { border-right: none; }
  .cal-cell:hover { background: #f7f9fe; }
  .cal-cell.out { background: #fafbfd; }
  .cal-cell.out:hover { background: #f4f6fb; }
  .cal-cell.out .cal-daynum { color: #c3ccdd; }
  .cal-cell.today { background: var(--today); }
  .cal-cell.today:hover { background: #fff1d4; }
  .cal-daynum { font-size: 13px; font-weight: 800; color: var(--text); align-self: flex-start; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all .14s; }
  .cal-cell.today .cal-daynum { background: var(--gold); color: #fff; box-shadow: 0 2px 8px rgba(232,160,32,0.45); }
  .cal-ev { font-size: 11.5px; font-weight: 700; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid; line-height: 1.3; transition: transform .12s, box-shadow .12s; }
  .cal-ev:hover { transform: translateX(2px); box-shadow: var(--shadow); }
  .cal-more { font-size: 10.5px; color: var(--muted); font-weight: 800; cursor: pointer; padding-left: 5px; }
  .cal-more:hover { color: var(--navy); }

  /* cores por status */
  .ev-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .ev-red   { background: var(--red-bg);   color: var(--red);   border-color: var(--red); }
  .ev-blue  { background: var(--blue-bg);  color: var(--blue-text); border-color: var(--navy-light); }
  .ev-green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .ev-gray  { background: #eef1f6; color: #5b6577; border-color: #9aa6bd; }

  /* ── Seções (Próximos / Busca) ──────────────────────────────────────────── */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
  .section-head { display: flex; align-items: center; gap: 10px; padding: 16px 22px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg,#fbfcff,#f4f7fd); }

  .section-head .ico { font-size: 18px; }
  .section-head .count { margin-left: auto; font-size: 12px; font-weight: 800; color: var(--muted); background: #eef2fa; border:1px solid var(--border); padding: 3px 11px; border-radius: 20px; }

  /* grid de próximos */
  .up-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 14px; }
  .up-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--navy); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); cursor: pointer; transition: box-shadow .16s, transform .12s, border-color .16s; }
  .up-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .up-card.is-today { border-left-color: var(--gold); background: linear-gradient(180deg,var(--today),#fff); }
  .up-card.is-past  { opacity: 0.6; }
  .up-when { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--navy); display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .up-daychip { background: var(--navy); color: #fff; border-radius: 8px; padding: 4px 10px; font-size: 11.5px; font-weight: 800; }
  .up-card.is-today .up-daychip { background: var(--gold); }
  .up-num { font-size: 16px; font-weight: 800; color: var(--navy); }
  .up-obj { font-size: 12.5px; color: var(--text); line-height: 1.45; margin: 5px 0 9px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .up-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .up-tag { font-size: 10.5px; font-weight: 800; padding: 3px 9px; border-radius: 6px; }
  .up-resp { background: #ede8fb; color: #5b3fb3; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; font-style: italic; padding: 30px 10px; grid-column: 1/-1; }

  /* busca */
  .search-wrap { position: relative; }
  .search-wrap .search-ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 17px; pointer-events: none; }
  #buscaInput { width: 100%; padding: 13px 16px 13px 44px; border: 1.5px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 14.5px; color: var(--text); background: #fff; outline: none; transition: border-color .14s, box-shadow .14s; }
  #buscaInput:focus { border-color: var(--navy-light); box-shadow: 0 0 0 3px rgba(46,93,168,0.12); }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #eef2fa; border: none; width: 26px; height: 26px; border-radius: 50%; color: var(--muted); font-size: 15px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .search-clear:hover { background: #e0e6f2; color: var(--text); }
  .search-clear.show { display: flex; }
  .search-results { margin-top: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 12px; }
  .mini-card { background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--navy); border-radius: 11px; padding: 12px 14px; cursor: pointer; transition: box-shadow .15s, transform .12s; }
  .mini-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

  .mini-tag { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 5px; }
  .search-hint { color: var(--muted); font-size: 12.5px; font-style: italic; padding: 16px 2px 2px; }

  /* ── Modal (detalhe + cadastro) ─────────────────────────────────────────── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(8,18,45,0.58); z-index: 600; align-items: center; justify-content: center; backdrop-filter: blur(3px); padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; animation: slideUp .22s ease; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1.5px solid var(--border); }
  .modal-header h2 { font-size: 17px; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; line-height: 1; }
  .modal-body { padding: 20px 22px; }
  .modal-footer { padding: 16px 22px; border-top: 1.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11.5px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .field input, .field select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 14px; color: var(--text); background: #fff; outline: none; }

  .row2 { display: flex; gap: 12px; flex-wrap: wrap; }
  .row2 .field { flex: 1; min-width: 150px; }
  .btn-cancel { background: #fff; border: 1.5px solid var(--border); color: var(--muted); border-radius: 9px; padding: 10px 18px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-save { background: var(--navy); border: 1.5px solid var(--navy); color: #fff; border-radius: 9px; padding: 10px 20px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-save:hover { background: var(--navy-mid); }

  /* detalhe */
  .det-num { font-size: 19px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
  .det-obj { font-size: 14px; color: var(--text); line-height: 1.5; margin-bottom: 16px; }
  .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; }
  .det-item .k { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .det-item .v { font-size: 14px; color: var(--text); margin-top: 2px; }
  .det-full { grid-column: 1/-1; }
  .det-link { color: var(--navy-light); font-weight: 700; word-break: break-all; text-decoration: none; }
  .det-link:hover { text-decoration: underline; }
  .det-portal-btn { display: inline-flex; align-items: center; gap: 7px; margin-top: 4px; background: var(--navy); color: #fff; padding: 9px 16px; border-radius: 9px; font-size: 13px; font-weight: 700; text-decoration: none; }
  .det-portal-btn:hover { background: var(--navy-mid); }
  .det-badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--navy-dark); color: #fff; padding: 12px 22px; border-radius: 11px; font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none; transition: all .25s; z-index: 900; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<main>
  <!-- Calendário -->
  <section class="cal-panel">
    <div class="cal-head">
      <div class="cal-title" id="calTitulo">—</div>

        <button class="hoje-btn" onclick="irHoje()">Hoje</button>

<!-- Modal detalhe -->

        <div class="field">
          <label>Horário de Abertura</label>

      <div class="field">
        <label>Objeto / Descrição</label>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   AGENDA DE LICITAÇÕES — Ijuí / COPAM
   Lê e grava na MESMA coleção "processos" do index.html (Firestore em tempo real).
   Mostra somente informações básicas + link do portal. Sem atualizações,
   propostas ou habilitação.
   ════════════════════════════════════════════════════════════════════════════ */

var STATUS_DEFAULT=[
  {id:"em-andamento",       nome:"Em Andamento",        cor:"amber", ordem:0},
  {id:"em-recurso-suspenso",nome:"Em Recurso/Suspenso", cor:"red",   ordem:1},
  {id:"finalizacao",        nome:"Finalização",         cor:"blue",  ordem:2},
  {id:"concluido",          nome:"Concluído",           cor:"green", ordem:3}
];

var processos = [], agentes = [], statusList = STATUS_DEFAULT.slice();
var hojeRef = new Date();
var calRef  = new Date(hojeRef.getFullYear(), hojeRef.getMonth(), 1);

var MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function escHtml(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function ymd(d){ return d.toISOString().split("T")[0]; }
function hojeStr(){ var d=new Date(); return ymd(new Date(d.getFullYear(),d.getMonth(),d.getDate())); }
function fmtData(iso){ if(!iso)return ""; var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function fmtDiaMes(iso){ if(!iso)return ""; var p=iso.split("-"); return p[2]+"/"+p[1]; }

/* ── Tipo de licitação e rótulos ────────────────────────────────────────── */
/* Traduz prefixos/códigos para nome legível: PE/RPPE -> Pregão; CC/CONCORRENCIA -> Concorrência */
function tipoLicitacao(numero){
  var n=(numero||"").toString().trim().toUpperCase();
  if(/^(RP\s*PE|RPPE)\b/.test(n) || /^PE\b/.test(n) || /PREG/.test(n)) return "Pregão";
  if(/^(CC|CONC)/.test(n) || /CONCORR/.test(n)) return "Concorrência";
  return ""; /* desconhecido */
}
/* Extrai apenas o número/sequência (ex: "PE 45/2026" -> "45/2026") */
function numeroSeq(numero){
  var n=(numero||"").toString().trim();
  var m=n.match(/(\d+\s*\/?\s*\d{0,4})\s*$/);
  return m?m[1].replace(/\s+/g,""):n;
}
/* Primeiro nome do agente responsável */
function primeiroNome(abrev){
  var comp=nomeCompletoResp(abrev)||abrev||"";
  return comp.toString().trim().split(/\s+/)[0]||"";
}
/* Rótulo curto para o chip da agenda: "09:00 · Concorrência 16 · LUCILDA" */
function rotuloAgenda(p){
  var tipo=tipoLicitacao(p.numero);
  var seq=numeroSeq(p.numero);
  var soNum=(seq||"").split("/")[0];
  var nome=primeiroNome(p.responsavel);
  var base = tipo ? (tipo+" "+soNum) : (p.numero||"s/ nº");
  var rotulo = base + (nome ? " · "+nome : "");
  return (p.horarioAbertura ? p.horarioAbertura+" · " : "") + rotulo;
}

function statusCorClasse(stId){
  var s=statusList.find(function(x){return x.id===stId;});
  var cor=s?s.cor:"gray";
  return "ev-"+(["amber","red","blue","green"].indexOf(cor)>=0?cor:"gray");
}
function statusNome(stId){
  var s=statusList.find(function(x){return x.id===stId;});
  return s?(s.nome||s.id):(stId||"—");
}
function statusBadgeStyle(stId){
  var s=statusList.find(function(x){return x.id===stId;});
  var cor=s?s.cor:"gray";
  var map={amber:["var(--amber-bg)","var(--amber)"],red:["var(--red-bg)","var(--red)"],blue:["var(--blue-bg)","var(--blue-text)"],green:["var(--green-bg)","var(--green)"],gray:["#eef1f6","#5b6577"]};
  var c=map[cor]||map.gray;
  return "background:"+c[0]+";color:"+c[1];
}
function nomeCompletoResp(abrev){
  var a=agentes.find(function(x){return x.nomeAbrev===abrev;});
  return a?(a.nomeCompleto||a.nomeAbrev):(abrev||"");
}

function renderCalendario(){
  var grid=document.getElementById("calGrid");
  var ano=calRef.getFullYear(), mes=calRef.getMonth();
  document.getElementById("calTitulo").textContent=MESES[mes]+" de "+ano;

  /* mapa data -> processos */
  var porData={};
  processos.forEach(function(p){
    if(!p.dataLicit) return;
    (porData[p.dataLicit]=porData[p.dataLicit]||[]).push(p);
  });

  var primeiro=new Date(ano,mes,1);
  /* recua até a segunda-feira da semana do dia 1 */
  var diaSemana=primeiro.getDay();              // 0=Dom ... 6=Sáb
  var recuo=(diaSemana===0)?6:(diaSemana-1);    // dias até a segunda anterior
  var inicioGrade=new Date(ano,mes,1-recuo);
  var hoje=hojeStr();
  var d=new Date(inicioGrade);
  var semanas=[];
  var atual=[];
  /* gera 6 semanas (seg-sex), agrupadas, depois descarta semanas 100% fora do mês */
  var contadas=0;
  while(contadas<6){
    var dia=d.getDay();
    if(dia>=1 && dia<=5){ atual.push(new Date(d)); }
    if(dia===5){ semanas.push(atual); atual=[]; contadas++; }
    d.setDate(d.getDate()+1);
  }
  /* remove semanas finais cujos dias são todos de outro mês */
  while(semanas.length>1){
    var ult=semanas[semanas.length-1];
    var temDoMes=ult.some(function(x){return x.getMonth()===mes;});
    if(temDoMes) break;
    semanas.pop();
  }
  var html="";
  semanas.forEach(function(semana){
    semana.forEach(function(dd){
      var iso=ymd(dd);
      var fora=dd.getMonth()!==mes;
      var ehHoje=iso===hoje;
      var cls="cal-cell"+(fora?" out":"")+(ehHoje?" today":"");
      html+='<div class="'+cls+'">';
      html+='<span class="cal-daynum">'+dd.getDate()+'</span>';
      var evs=porData[iso]||[];
      evs.slice(0,3).forEach(function(p){
        html+='<div class="cal-ev '+statusCorClasse(p.status)+'" onclick="abrirDetalhe(\''+escHtml(p.id)+'\')" title="'+escHtml((p.numero||"")+" — "+(p.objeto||""))+'">'+escHtml(rotuloAgenda(p))+'</div>';
      });
      if(evs.length>3){ html+='<span class="cal-more" onclick="abrirDetalhe(\''+escHtml(evs[3].id)+'\')">+'+(evs.length-3)+' mais</span>'; }
      html+='</div>';
    });
  });
  grid.innerHTML=html;
}

function renderProximos(){
  var box=document.getElementById("proximosLista");
  var hoje=hojeStr();
  var comData=processos.filter(function(p){ return p.dataLicit; });
  /* processos de hoje */
  var deHoje=comData.filter(function(p){return p.dataLicit===hoje;})
    .sort(function(a,b){return (a.numero||"").localeCompare(b.numero||"");});
  /* próximos (depois de hoje), ascendente, até 5 */
  var proximos=comData.filter(function(p){return p.dataLicit>hoje;})
    .sort(function(a,b){return a.dataLicit.localeCompare(b.dataLicit);})
    .slice(0,5);
  var lista=deHoje.concat(proximos);

  var cnt=document.getElementById("proximosCount");
  if(cnt) cnt.textContent=lista.length?(lista.length+" processo(s)"):"";

  if(!lista.length){ box.innerHTML='<div class="empty">Nenhum processo agendado para hoje ou os próximos dias.<br>Clique em “Novo Processo” para começar.</div>'; return; }

  var html="";
  lista.forEach(function(p){
    var ehHoje=p.dataLicit===hoje;
    var cls="up-card"+(ehHoje?" is-today":"");
    var quando=ehHoje?"Hoje":diasAte(p.dataLicit);
    var tipo=tipoLicitacao(p.numero);
    var titulo=tipo?(tipo+" "+numeroSeq(p.numero)):(p.numero||"Sem número");
    html+='<div class="'+cls+'" onclick="abrirDetalhe(\''+escHtml(p.id)+'\')">';
    html+='<div class="up-when"><span class="up-daychip">'+fmtDiaMes(p.dataLicit)+'</span> '+escHtml(quando)+(p.horarioAbertura?' · '+escHtml(p.horarioAbertura):'')+'</div>';
    html+='<div class="up-num">'+escHtml(titulo)+'</div>';
    if(p.objeto) html+='<div class="up-obj">'+escHtml(p.objeto)+'</div>';
    html+='<div class="up-meta">';
    html+='<span class="up-tag" style="'+statusBadgeStyle(p.status)+'">'+escHtml(statusNome(p.status))+'</span>';
    if(p.responsavel) html+='<span class="up-tag up-resp">'+escHtml(primeiroNome(p.responsavel))+'</span>';
    html+='</div></div>';
  });
  box.innerHTML=html;
}

/* ── Busca de processos (card reduzido) ─────────────────────────────────── */
function _buscaNorm(s){
  return (s||"").toString().toLowerCase()
    .replace(/[àáâãä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôõö]/g,"o").replace(/[ùúûü]/g,"u").replace(/[ç]/g,"c");
}
function renderBusca(termo){
  var box=document.getElementById("buscaResultados");
  var hint=document.getElementById("buscaHint");
  var clr=document.getElementById("buscaClear");
  var t=_buscaNorm((termo||"").trim());
  if(clr) clr.classList.toggle("show", !!t);

  if(!t){ box.innerHTML=""; if(hint){ hint.style.display="block"; hint.textContent="Digite para localizar um processo cadastrado."; } return; }

  var achados=processos.filter(function(p){
    var tipo=tipoLicitacao(p.numero);
    var rotulo=tipo?(tipo+" "+numeroSeq(p.numero)):"";
    return _buscaNorm(p.numero).indexOf(t)>=0
        || _buscaNorm(p.objeto).indexOf(t)>=0
        || _buscaNorm(rotulo).indexOf(t)>=0;
  }).sort(function(a,b){
    return (b.dataLicit||"").localeCompare(a.dataLicit||"");
  });

  if(hint){
    hint.style.display="block";
    hint.textContent=achados.length?(achados.length+" processo(s) encontrado(s)"):"Nenhum processo encontrado para “"+termo.trim()+"”.";
  }

  var html="";
  achados.forEach(function(p){
    var tipo=tipoLicitacao(p.numero);
    var titulo=tipo?(tipo+" "+numeroSeq(p.numero)):(p.numero||"Sem número");
    html+='<div class="mini-card" style="border-left-color:'+_buscaBorda(p.status)+'" onclick="abrirDetalhe(\''+escHtml(p.id)+'\')">';
    html+='<div class="mini-top"><span class="mini-num">'+escHtml(titulo)+'</span>';
    html+='<span class="mini-date">'+(p.dataLicit?escHtml(fmtData(p.dataLicit)):"sem data")+'</span></div>';
    if(p.objeto) html+='<div class="mini-obj">'+escHtml(p.objeto)+'</div>';
    html+='<div class="mini-meta">';
    html+='<span class="mini-tag" style="'+statusBadgeStyle(p.status)+'">'+escHtml(statusNome(p.status))+'</span>';
    if(p.responsavel) html+='<span class="mini-tag up-resp">'+escHtml(primeiroNome(p.responsavel))+'</span>';
    html+='</div></div>';
  });
  box.innerHTML=html;
}
function _buscaBorda(stId){
  var s=statusList.find(function(x){return x.id===stId;});
  var cor=s?s.cor:"gray";
  var map={amber:"#c07000",red:"#c0282a",blue:"#2e5da8",green:"#2a8a3a",gray:"#9aa6bd"};
  return map[cor]||map.gray;
}

function diasAte(iso){

}

/* ── Auto-fill via Portal de Compras Públicas ─────────────────────────────── */
function _portalOnPaste(ev){
  setTimeout(function(){
    var val=document.getElementById("cLink").value.trim();
    if(val) puxarDadosPortal(val);
  }, 50);
}
function _portalAutoFill(val){
  clearTimeout(_portalDebounceTimer);
  if(!val||!val.includes("portaldecompraspublicas")) return;
  _portalDebounceTimer=setTimeout(function(){ puxarDadosPortal(val); },400);
}
function _portalNorm(s){
  return (s||"").toLowerCase().trim()
    .replace(/[àáâãä]/g,"a").replace(/[èéêë]/g,"e").replace(/[ìíîï]/g,"i")
    .replace(/[òóôõö]/g,"o").replace(/[ùúûü]/g,"u").replace(/[ç]/g,"c");
}
function _portalLinhas(docHtml){
  var tmp=document.createElement("div"); tmp.innerHTML=docHtml;
  var walker=document.createTreeWalker(tmp,NodeFilter.SHOW_TEXT,{acceptNode:function(node){
    var tag=node.parentElement&&node.parentElement.tagName;
    if(["SCRIPT","STYLE","NOSCRIPT"].indexOf(tag)>=0) return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;
  }});
  var lines=[]; while(walker.nextNode()){ var t=walker.currentNode.nodeValue.trim(); if(t) lines.push(t); }
  return lines;
}
function _portalValor(lines,label){
  var nl=_portalNorm(label);
  for(var i=0;i<lines.length-1;i++){ if(_portalNorm(lines[i]).indexOf(nl)>=0) return lines[i+1]; }
  return "";
}
/* retorna o ÚLTIMO valor associado a um label (ex: Abertura das Propostas aparece duas vezes) */
function _portalUltimoValor(lines,label){
  var nl=_portalNorm(label); var last="";
  for(var i=0;i<lines.length-1;i++){ if(_portalNorm(lines[i]).indexOf(nl)>=0) last=lines[i+1]; }
  return last;
}
function _portalDataISO(txt){
  var m=(txt||"").match(/(\d{2})\/(\d{2})\/(\d{4})/);
  return m?m[3]+"-"+m[2]+"-"+m[1]:"";
}
function _portalHorario(txt){
  /* Portal armazena horarios em UTC no HTML do servidor;
     o JS do browser converte para Brasilia (UTC-3). Fazemos o mesmo. */
  var m=(txt||"").match(/(\d{1,2})[:h](\d{2})/);
  if(!m) return "";
  var h=parseInt(m[1],10)-3;
  if(h<0) h+=24;
  return ("0"+h).slice(-2)+":"+m[2];
}
function _portalNumeroDoLink(url){
  try{
    var seg=url.split("?")[0].replace(/\/+$/,"").split("/").pop();
    var m=seg.match(/^([A-Za-z]+)-(\d+)-(\d{4})/);
    if(m) return m[1].toUpperCase()+" "+m[2]+"/"+m[3];
  }catch(e){}
  return "";
}
function _portalFetch(url){
  return fetch(WORKER_URL+"?url="+encodeURIComponent(url))
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); });
}
function puxarDadosPortal(link){
  var ps=document.getElementById("portalStatus"); if(!ps) return;
  ps.textContent="⏳ Buscando dados do portal…"; ps.style.color="#6b7793";
  _portalFetch(link).then(function(html){
    var lines=_portalLinhas(html);

    /* ── 1. TIPO: lê "Tipo:" da página para detectar Pregão vs Concorrência ── */
    var tipoTexto=_portalValor(lines,"Tipo:") || _portalValor(lines,"Tipo");
    var tipoDetect="";
    if(_portalNorm(tipoTexto).indexOf("concorr")>=0) tipoDetect="Concorrência";
    else if(_portalNorm(tipoTexto).indexOf("preg")>=0) tipoDetect="Pregão";
    /* fallback: tenta deduzir pelo prefixo do link */
    if(!tipoDetect){
      var seg=(link.split("?")[0].replace(/\/+$/,"").split("/").pop()||"").toUpperCase();
      if(/^(PE|RPPE|SRPE)/.test(seg)) tipoDetect="Pregão";
      else if(/^(CC|CONC|CPMP|CMCP)/.test(seg)) tipoDetect="Concorrência";
    }
    if(tipoDetect){
      var selT=document.getElementById("cTipo"); if(selT) selT.value=tipoDetect;
    }

    /* ── 2. NÚMERO: extrai só a sequência do link ─────────────────────────── */
    var numero=_portalNumeroDoLink(link);
    var seq=numero?numeroSeq(numero):"";
    var inS=document.getElementById("cNumeroSeq");
    if(inS && !inS.value.trim() && seq) inS.value=seq;

    /* ── 3. OBJETO: maior h1/h2 da página ────────────────────────────────── */
    var tmp=document.createElement("div"); tmp.innerHTML=html;
    var best="",maxLen=0;
    tmp.querySelectorAll("h1,h2").forEach(function(el){ var t=el.textContent.trim(); if(t.length>maxLen){maxLen=t.length;best=t;} });
    if(best && !document.getElementById("cObjeto").value.trim())
      document.getElementById("cObjeto").value=best;

    /* ── 4. DATA: busca primeira data válida entre os campos de prazo ──────── */
    var dataISO="";
    ["Abertura das Propostas","Limite p/ Recebimento","Data de Publicação"].forEach(function(lb){
      if(!dataISO) dataISO=_portalDataISO(_portalValor(lines,lb));
    });
    if(dataISO && !document.getElementById("cData").value)
      document.getElementById("cData").value=dataISO;

    /* ── 5. HORÁRIO: usa "Limite p/ Recebimento" (horário local) como prioridade ── */
    var hrTxt = _portalValor(lines,"Limite p/ Recebimento das Propostas")
             || _portalValor(lines,"Limite p/ Recebimento")
             || _portalUltimoValor(lines,"Abertura das Propostas")
             || _portalUltimoValor(lines,"Sessão Pública");
    var hr = hrTxt ? _portalHorario(hrTxt) : "";
    if(hr && !document.getElementById("cHorario").value)
      document.getElementById("cHorario").value=hr;

    /* ── 6. AGENTE: tenta "Agente de Contratação" antes de "Pregoeiro" ─────── */
    var agenteTxt = _portalValor(lines,"Agente de Contratação")
                 || _portalValor(lines,"Pregoeiro");
    if(agenteTxt){
      var abrev=agenteTxt.trim().split(/\s+/)[0];
      var found=agentes.find(function(a){
        return _portalNorm(a.nomeCompleto||"").indexOf(_portalNorm(abrev))>=0
            || _portalNorm(a.nomeAbrev||"")===_portalNorm(abrev);
      });
      if(found){
        document.getElementById("cResponsavel").value=found.nomeAbrev;
      } else {
        var ts=firebase.firestore.FieldValue.serverTimestamp();
        agColRef.add({nomeAbrev:abrev,nomeCompleto:agenteTxt.trim(),nomeCompleto2:"",createdAt:ts,updatedAt:ts})
          .then(function(){ setTimeout(function(){
            var ag=agentes.find(function(a){ return _portalNorm(a.nomeAbrev)===_portalNorm(abrev); });
            if(ag) document.getElementById("cResponsavel").value=ag.nomeAbrev;
          },600); });
      }
    }

    var ok=[tipoDetect,seq,best,dataISO,hr,agenteTxt].filter(Boolean).length;
    ps.textContent=ok?"✔ Dados preenchidos automaticamente pelo portal.":"⚠ Não foi possível extrair dados desta página.";
    ps.style.color=ok?"#1d7a3a":"#c07000";
  }).catch(function(e){
    ps.textContent="⚠ Erro ao acessar o portal: "+e.message;
    ps.style.color="#c0282a";
  });
}

  var link=document.getElementById("cLink").value.trim();
  var contato=document.getElementById("cContato").value.trim();
  if(!seq){ alert("Informe o número da licitação."); return; }
  if(!objeto){ alert("Informe o objeto / descrição."); return; }
  /* monta o código do processo conforme padrão do sistema: Pregão->PE, Concorrência->CC */
  var prefixo = tipo==="Concorrência" ? "CC" : "PE";
  var numero = prefixo+" "+seq;
  btn.disabled=true; btn.textContent="Salvando…";
  var ts=firebase.firestore.FieldValue.serverTimestamp();
  colRef.add({
    numero:numero, tipo:tipo, objeto:objeto, responsavel:resp, status:status,
    dataLicit:dataLicit, horarioAbertura:horario,
    link:link, contato:contato, atualizacoes:[], createdAt:ts
  })
  .then(function(){ toast("Processo cadastrado!"); fecharCadastro(); })
  .catch(function(e){ alert("Erro ao salvar: "+e.message); })
  .finally(function(){ btn.disabled=false; btn.textContent="Salvar Processo"; });
}

/* fechar modais ao clicar fora */
["modalDetalhe","modalCadastro"].forEach(function(id){
  document.getElementById(id).addEventListener("click", function(e){ if(e.target===this) this.classList.remove("open"); });
});
</script>
</body>
</html>
